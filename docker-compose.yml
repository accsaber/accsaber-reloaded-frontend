services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_URL: ${VITE_ADMIN_URL}
        VITE_RANKING_URL: ${VITE_RANKING_URL}
    container_name: accsaber-frontend
    restart: unless-stopped
    environment:
      - API_PROXY_TARGET=${API_PROXY_TARGET}
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  coolify:
    external: true
