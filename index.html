<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccSaber Reloaded</title>
    <meta name="description" content="Accuracy-based leaderboard platform for Beat Saber." />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AccSaber Reloaded" />
    <meta property="og:description" content="Accuracy-based leaderboard platform for Beat Saber." />
    <meta property="og:image" content="https://accsaberreloaded.com/icon-512x512.png" />
    <meta property="og:url" content="https://accsaberreloaded.com" />

    <script>
      ;(function () {
        var root = document.documentElement
        var t = localStorage.getItem('theme')
        if (!t) {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
        }
        root.setAttribute('data-theme', t)
        var raw = localStorage.getItem('theme:tokens')
        if (raw) {
          try {
            var tokens = JSON.parse(raw)
            if (tokens && typeof tokens === 'object') {
              for (var k in tokens) {
                if (Object.prototype.hasOwnProperty.call(tokens, k) && typeof tokens[k] === 'string') {
                  root.style.setProperty('--' + k.replace(/\./g, '-'), tokens[k])
                }
              }
            }
          } catch (_) { /* ignore malformed token cache */ }
        }
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
